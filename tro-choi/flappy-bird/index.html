<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100dvh; 
        font-family: 'Courier New', Courier, monospace;
        overflow: hidden;
    }
    
    #game-container {
        position: relative;
        background-color: #70c5ce;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        width: 100%;
        max-width: 400px;
        aspect-ratio: 9 / 16; 
        max-height: 90dvh;
        border-radius: 10px;
        transition: filter 0.5s; 
    }

    .slow-motion-effect {
        filter: hue-rotate(180deg) contrast(1.2);
    }

    @media (max-width: 768px) {
        #game-container {
            width: 100%;
            height: 100%;
            max-width: none;
            max-height: none;
            border-radius: 0;
            aspect-ratio: unset;
            box-shadow: none;
        }
    }

    canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated; 
    }

    #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        z-index: 30;
    }

    #intro-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 20;
    }

    .hidden {
        display: none !important;
    }

    #score-display {
        position: absolute;
        top: 10%;
        font-size: 3rem;
        font-weight: bold;
        color: white;
        text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
        z-index: 10;
        pointer-events: none;
    }
    
    #status-text {
        position: absolute;
        top: 18%;
        font-size: 1rem;
        font-weight: bold;
        color: #FFF;
        text-shadow: 1px 1px 0 #000;
        z-index: 10;
        opacity: 0.8;
    }

    #slow-mo-alert {
        position: absolute;
        top: 25%;
        font-size: 2rem;
        font-weight: bold;
        color: #00FFFF;
        text-shadow: 2px 2px 0 #000;
        z-index: 10;
        display: none;
        animation: pulse 1s infinite;
    }
    
    #gun-alert {
        position: absolute;
        bottom: 20%;
        font-size: 1.5rem;
        font-weight: bold;
        color: #FF4500; /* Đỏ cam */
        text-shadow: 2px 2px 0 #FFF;
        z-index: 10;
        display: none;
        animation: shake 0.5s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes shake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        10% { transform: translate(-1px, -2px) rotate(-1deg); }
        20% { transform: translate(-3px, 0px) rotate(1deg); }
        30% { transform: translate(3px, 2px) rotate(0deg); }
        40% { transform: translate(1px, -1px) rotate(1deg); }
        50% { transform: translate(-1px, 2px) rotate(-1deg); }
        60% { transform: translate(-3px, 1px) rotate(0deg); }
        70% { transform: translate(3px, 1px) rotate(-1deg); }
        80% { transform: translate(-1px, -1px) rotate(1deg); }
        90% { transform: translate(1px, 2px) rotate(0deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
    }

    #start-screen, #game-over-screen {
        background: rgba(0, 0, 0, 0.6);
        padding: 20px;
        border-radius: 10px;
        pointer-events: auto;
        color: white;
        text-shadow: 2px 2px 0 #000;
        min-width: 200px;
    }

    #game-over-screen {
        background: #ded895;
        border: 2px solid #543847;
        color: #543847;
        text-shadow: none;
        box-shadow: inset 0 0 0 3px #fff;
    }

    .btn {
        margin-top: 20px;
        padding: 10px 20px;
        background-color: #e86101;
        border: 2px solid #fff;
        color: white;
        font-size: 1.2rem;
        font-weight: bold;
        cursor: pointer;
        text-shadow: 1px 1px 0 #000;
        box-shadow: 0 4px 0 #000;
        touch-action: manipulation;
    }

    .btn:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 #000;
    }

    .win-text {
        color: #FFD700 !important;
        text-shadow: 2px 2px 0 #FF4500 !important;
        animation: blink 0.5s infinite;
        font-size: 2.5rem;
    }
    
    .hit-flash {
        animation: flashRed 0.2s ease-out;
    }
    
    @keyframes flashRed {
        0% { box-shadow: inset 0 0 0 50px rgba(255,0,0,0.5); }
        100% { box-shadow: inset 0 0 0 0 rgba(255,0,0,0); }
    }
    
    @keyframes blink {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }
</style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <video id="intro-video" src="/video/rickroll.mp4" playsinline class="hidden"></video>

    <div id="score-display">0</div>
    <div id="status-text">Next Slow: 10 pipes</div>
    <div id="slow-mo-alert">🌶️🌶️🌶️ MODE!</div>
    <div id="gun-alert">GUN ACTIVE!</div>
    
    <div id="ui-layer">
        <div id="start-screen">
            <h1>FLAPPY BIRD</h1>
            <p>Tap / Space to Fly</p>
            <p style="font-size: 0.8rem; color: #FFD700; margin-top: 5px;">Note: Game cay dái</p>
            <button class="btn" id="start-btn">START</button>
        </div>
        
        <div id="game-over-screen" class="hidden">
            <h2 id="end-title">GAME OVER</h2>
            <p>Score: <span id="final-score">0</span></p>
            <p>Best: <span id="best-score">0</span></p>
            <button class="btn" id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameContainer = document.getElementById('game-container');
    
    const uiStart = document.getElementById('start-screen');
    const uiGameOver = document.getElementById('game-over-screen');
    const endTitle = document.getElementById('end-title');
    const scoreDisplay = document.getElementById('score-display');
    const statusText = document.getElementById('status-text');
    const slowMoAlert = document.getElementById('slow-mo-alert');
    const gunAlert = document.getElementById('gun-alert');
    const finalScoreDisplay = document.getElementById('final-score');
    const bestScoreDisplay = document.getElementById('best-score');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const introVideo = document.getElementById('intro-video');

    // Game constants
    const GAME_WIDTH = 288;
    const GAME_HEIGHT = 512;
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;

    // --- GAME VARIABLES ---
    let frames = 0;
    let score = 0;
    let bestScore = 0;
    let currentState = 'START'; 
    let floatingTexts = [];
    
    // Gun Mode Variables
    let gunTimer = 0; // Đếm ngược thời gian có súng
    let bullets = []; // Mảng chứa đạn

    // Slow Motion Cycle Config
    const PIPES_TO_TRIGGER_SLOW = 10;
    const PIPES_DURATION_SLOW = 5;
    const COOLDOWN_DURATION = 10000;

    let slowMoPhase = 'CHARGING'; 
    let phasePipeCounter = 0; 
    let cooldownTimerID = null;
    let isSlowMotion = false;

    // Physics
    const BASE_GRAVITY = 0.25;
    const BASE_JUMP = -4.6;
    const BASE_SPEED = 2;
    const SLOW_GRAVITY = 0.125;
    const SLOW_JUMP = -3.5;
    const SLOW_SPEED = 1;

    let GRAVITY = BASE_GRAVITY;
    let JUMP = BASE_JUMP;
    let SPEED = BASE_SPEED;

    function setGameSpeed(slow) {
        if (slow) {
            isSlowMotion = true;
            GRAVITY = SLOW_GRAVITY;
            JUMP = SLOW_JUMP;
            SPEED = SLOW_SPEED;
            gameContainer.classList.add('slow-motion-effect');
            slowMoAlert.style.display = 'block';
        } else {
            isSlowMotion = false;
            GRAVITY = BASE_GRAVITY;
            JUMP = BASE_JUMP;
            SPEED = BASE_SPEED;
            gameContainer.classList.remove('slow-motion-effect');
            slowMoAlert.style.display = 'none';
            pipes.dx = SPEED;
        }
    }

    function updateStatusText() {
        if (slowMoPhase === 'CHARGING') {
            statusText.innerText = `Next Slow: ${PIPES_TO_TRIGGER_SLOW - phasePipeCounter} pipes`;
            statusText.style.color = '#FFF';
        } else if (slowMoPhase === 'ACTIVE') {
            statusText.innerText = `Slow Ending in: ${PIPES_DURATION_SLOW - phasePipeCounter} pipes`;
            statusText.style.color = '#00FFFF';
        } else if (slowMoPhase === 'COOLDOWN') {
            statusText.innerText = "Cooldown...";
            statusText.style.color = '#FFA500';
        }
    }

    function startCooldown() {
        setGameSpeed(false);
        slowMoPhase = 'COOLDOWN';
        updateStatusText();

        cooldownTimerID = setTimeout(() => {
            if (currentState === 'PLAY') {
                slowMoPhase = 'CHARGING';
                phasePipeCounter = 0;
                updateStatusText();
                floatingTexts.push({ x: bird.x, y: bird.y - 40, text: "READY!", color: "#FFF", life: 60 });
            }
        }, COOLDOWN_DURATION);
    }

    const bird = {
        x: 50, y: 150, w: 34, h: 24, radius: 12, velocity: 0, rotation: 0,
        
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.fillStyle = '#f3c300'; ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = '#000'; ctx.stroke();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(-4, 2, 6, 4, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(6, -6, 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(8, -6, 1.5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#e86101'; ctx.beginPath(); ctx.rect(8, -1, 10, 6); ctx.fill(); ctx.stroke();
            ctx.restore();
            
            // Vẽ súng nếu đang active
            if (gunTimer > 0) {
                ctx.fillStyle = '#444';
                ctx.fillRect(this.x + 10, this.y + 5, 15, 6); // Súng giả
                ctx.fillStyle = 'red';
                ctx.fillRect(this.x + 25, this.y + 5, 3, 6); // Đầu súng
            }
        },
        update() {
            if (currentState === 'PLAY') {
                this.velocity += GRAVITY;
                this.y += this.velocity;
                if (this.velocity < JUMP/2) this.rotation = -25 * Math.PI / 180;
                else if (this.velocity > 0) {
                    this.rotation += (isSlowMotion ? 1.5 : 3) * Math.PI / 180; 
                    if (this.rotation > 90 * Math.PI / 180) this.rotation = 90 * Math.PI / 180;
                }
                
                if (this.y + this.radius >= GAME_HEIGHT - bg.groundHeight) {
                    this.y = GAME_HEIGHT - bg.groundHeight - this.radius;
                    gameOver(false); // Chạm đất
                }
                if (this.y - this.radius <= 0) { this.y = this.radius; this.velocity = 0; }
                
                // Gun Logic
                if (gunTimer > 0) {
                    gunTimer--;
                    if (gunTimer % 10 === 0) { // Bắn mỗi 10 frames
                        bullets.push({ x: this.x + 20, y: this.y + 8, r: 4 });
                    }
                    if (gunTimer <= 0) gunAlert.style.display = 'none';
                }
            } else if (currentState === 'START') {
                this.y = 150 + Math.cos(frames / 10) * 5; 
            }
        },
        flap() { this.velocity = JUMP; },
        reset() { this.x = 50; this.y = 150; this.velocity = 0; this.rotation = 0; }
    };

    const mysteryBoxes = {
        items: [], w: 30, h: 30,
        draw() {
            for (let i = 0; i < this.items.length; i++) {
                let b = this.items[i];
                if (b.collected) continue;
                ctx.fillStyle = '#FFD700'; 
                ctx.fillRect(b.x, b.y, this.w, this.h);
                ctx.lineWidth = 2; ctx.strokeStyle = '#DAA520'; ctx.strokeRect(b.x, b.y, this.w, this.h);
                ctx.fillStyle = '#FFF'; ctx.font = 'bold 20px Courier New'; ctx.fillText('?', b.x + 8, b.y + 22);
            }
        },
        update() {
            if (currentState !== 'PLAY') return;
            for (let i = 0; i < this.items.length; i++) {
                let b = this.items[i];
                b.x -= SPEED;
                if (!b.collected && bird.x + bird.radius > b.x && bird.x - bird.radius < b.x + this.w &&
                    bird.y + bird.radius > b.y && bird.y - bird.radius < b.y + this.h) {
                    b.collected = true;
                    openMysteryBox();
                }
                if (b.x + this.w < 0) { this.items.shift(); i--; }
            }
        },
        reset() { this.items = []; }
    };

    const pipes = {
        items: [], w: 52, gap: 120, dx: SPEED,
        draw() {
            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                ctx.fillStyle = '#73bf2e'; 
                ctx.lineWidth = 2; 
                ctx.strokeStyle = '#543847'; 

                // Vẽ ống trên nếu chưa bị bắn nát
                if (!p.topDestroyed) {
                    ctx.fillRect(p.x, 0, this.w, p.top);
                    ctx.strokeRect(p.x, 0, this.w, p.top);
                    ctx.fillRect(p.x - 2, p.top - 20, this.w + 4, 20); 
                    ctx.strokeRect(p.x - 2, p.top - 20, this.w + 4, 20);
                }

                // Vẽ ống dưới nếu chưa bị bắn nát
                if (!p.bottomDestroyed) {
                    ctx.fillRect(p.x, p.bottom, this.w, GAME_HEIGHT - p.bottom - bg.groundHeight);
                    ctx.strokeRect(p.x, p.bottom, this.w, GAME_HEIGHT - p.bottom - bg.groundHeight);
                    ctx.fillRect(p.x - 2, p.bottom, this.w + 4, 20); 
                    ctx.strokeRect(p.x - 2, p.bottom, this.w + 4, 20);
                }
            }
        },
        update() {
            if (currentState !== 'PLAY') return;
            this.dx = SPEED; 
            
            const frameInterval = isSlowMotion ? 200 : 100;

            if (frames % frameInterval === 0) {
                let minTop = 50;
                let maxTop = GAME_HEIGHT - bg.groundHeight - this.gap - 50;
                let topH = Math.floor(Math.random() * (maxTop - minTop + 1) + minTop);
                // Thêm thuộc tính topDestroyed và bottomDestroyed
                this.items.push({ 
                    x: GAME_WIDTH, 
                    top: topH, 
                    bottom: topH + this.gap, 
                    passed: false,
                    topDestroyed: false,
                    bottomDestroyed: false
                });
                
                if (Math.random() < 0.3) {
                    mysteryBoxes.items.push({ x: GAME_WIDTH + 10, y: topH + (this.gap - mysteryBoxes.h) / 2, collected: false });
                }
            }
            
            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                p.x -= this.dx;

                // Collision detection (Bird vs Pipe)
                // Chỉ chết nếu ống chưa bị phá hủy
                if (bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + this.w) {
                    // Check Top Pipe
                    if (!p.topDestroyed && bird.y - bird.radius < p.top) {
                         gameOver(false);
                    }
                    // Check Bottom Pipe
                    if (!p.bottomDestroyed && bird.y + bird.radius > p.bottom) {
                         gameOver(false);
                    }
                }
                
                if (p.x + this.w < bird.x && !p.passed) {
                    score++; scoreDisplay.innerText = score; p.passed = true;
                    if (slowMoPhase === 'CHARGING') {
                        phasePipeCounter++; updateStatusText();
                        if (phasePipeCounter >= PIPES_TO_TRIGGER_SLOW) {
                            setGameSpeed(true); slowMoPhase = 'ACTIVE'; phasePipeCounter = 0; updateStatusText();
                        }
                    } else if (slowMoPhase === 'ACTIVE') {
                        phasePipeCounter++; updateStatusText();
                        if (phasePipeCounter >= PIPES_DURATION_SLOW) {
                            startCooldown();
                        }
                    }
                }
                if (p.x + this.w < 0) { this.items.shift(); i--; }
            }
        },
        reset() { this.items = []; }
    };

    // Logic Bullet Update
    function updateBullets() {
        if (currentState !== 'PLAY') return;
        
        ctx.fillStyle = '#FF0000';
        for (let i = 0; i < bullets.length; i++) {
            let b = bullets[i];
            b.x += 6; // Đạn bay nhanh
            
            // Vẽ đạn
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.fill();

            // Check va chạm đạn với ống
            let hit = false;
            for (let j = 0; j < pipes.items.length; j++) {
                let p = pipes.items[j];
                
                // Va chạm ống trên
                if (!p.topDestroyed && b.x > p.x && b.x < p.x + pipes.w && b.y < p.top) {
                    p.topDestroyed = true;
                    hit = true;
                    // Tạo hiệu ứng nổ nhỏ (đơn giản là text)
                    floatingTexts.push({ x: p.x, y: p.top, text: "BOOM!", color: "#FFA500", life: 20 });
                }
                
                // Va chạm ống dưới
                if (!p.bottomDestroyed && b.x > p.x && b.x < p.x + pipes.w && b.y > p.bottom) {
                    p.bottomDestroyed = true;
                    hit = true;
                    floatingTexts.push({ x: p.x, y: p.bottom, text: "BOOM!", color: "#FFA500", life: 20 });
                }
            }

            if (hit || b.x > GAME_WIDTH) {
                bullets.splice(i, 1);
                i--;
            }
        }
    }

    const bg = {
        groundHeight: 112, groundX: 0,
        draw() {
            ctx.fillStyle = '#ded895'; ctx.fillRect(0, GAME_HEIGHT - this.groundHeight, GAME_WIDTH, this.groundHeight);
            ctx.fillStyle = '#73bf2e'; ctx.fillRect(0, GAME_HEIGHT - this.groundHeight, GAME_WIDTH, 12);
            ctx.beginPath(); ctx.moveTo(0, GAME_HEIGHT - this.groundHeight); ctx.lineTo(GAME_WIDTH, GAME_HEIGHT - this.groundHeight);
            ctx.lineWidth = 4; ctx.strokeStyle = '#543847'; ctx.stroke();
            ctx.strokeStyle = '#c4bb6b'; ctx.lineWidth = 2;
            for(let i = 0; i < GAME_WIDTH + 20; i+= 20) {
                ctx.beginPath(); ctx.moveTo(i + this.groundX, GAME_HEIGHT - this.groundHeight + 12);
                ctx.lineTo(i - 20 + this.groundX, GAME_HEIGHT); ctx.stroke();
            }
        },
        update() { if (currentState === 'PLAY' || currentState === 'START') this.groundX = (this.groundX - SPEED) % 20; }
    };

    function openMysteryBox() {
        let rand = Math.random() * 100; 
        let text = ""; let color = "#FFF";

        if (rand < 5) { // 5% Win
            gameOver(true); return;
        } else if (rand < 20) { // 15% +50
            score += 10; text = "+10"; color = "#00FF00"; 
        } else if (rand < 30) { // 10% GUN (Thay cho Clear Map)
            gunTimer = 120; // 2 giây (60fps * 2)
            gunAlert.style.display = 'block';
            text = "GUN!"; color = "#FF4500"; 
        } else if (rand < 70) { // 40% +10
            score += 2; text = "+2"; color = "#ADFF2F"; 
        } else { // 30% -20
            score -= 5; text = "-5"; color = "#FF4500"; 
        }

        scoreDisplay.innerText = score;
        floatingTexts.push({ x: bird.x, y: bird.y - 20, text: text, color: color, life: 60 });
    }

    function drawFloatingTexts() {
        for (let i = 0; i < floatingTexts.length; i++) {
            let t = floatingTexts[i];
            ctx.fillStyle = t.color; ctx.font = "bold 24px Courier New";
            ctx.strokeStyle = "black"; ctx.lineWidth = 4;
            ctx.strokeText(t.text, t.x, t.y); ctx.fillText(t.text, t.x, t.y);
            t.y -= isSlowMotion ? 0.75 : 1.5; t.life--;
            if (t.life <= 0) { floatingTexts.shift(); i--; }
        }
    }

    function gameOver(isWin) {
        if (currentState !== 'PLAY') return;

        if (score > bestScore) bestScore = score;
        currentState = 'HIT';
        gameContainer.classList.add('hit-flash');
        
        setTimeout(() => {
            triggerEnding(isWin);
        }, 1000);
    }

    function triggerEnding(isWin) {
        gameContainer.classList.remove('hit-flash');
        finalScoreDisplay.innerText = score;
        bestScoreDisplay.innerText = bestScore;
        scoreDisplay.classList.add('hidden');
        setGameSpeed(false); 
        if (cooldownTimerID) clearTimeout(cooldownTimerID);
        gunTimer = 0;
        gunAlert.style.display = 'none';
        
        if (isWin) {
            currentState = 'OVER';
            endTitle.innerText = "YOU WIN!";
            endTitle.classList.add('win-text');
            uiGameOver.classList.remove('hidden');
        } else {
            currentState = 'VIDEO';
            endTitle.innerText = "GAME OVER";
            endTitle.classList.remove('win-text');
            introVideo.classList.remove('hidden');
            introVideo.currentTime = 0;
            introVideo.play().catch(e => showGameOverScreen());
        }
    }

    function showGameOverScreen() {
        currentState = 'OVER';
        introVideo.classList.add('hidden');
        introVideo.pause();
        uiGameOver.classList.remove('hidden');
    }
    introVideo.addEventListener('ended', showGameOverScreen);

    function resetGame() {
        bird.reset(); pipes.reset(); mysteryBoxes.reset();
        floatingTexts = []; bullets = []; score = 0; gunTimer = 0;
        scoreDisplay.innerText = score; frames = 0; currentState = 'START';
        setGameSpeed(false); 
        
        if (cooldownTimerID) clearTimeout(cooldownTimerID);
        slowMoPhase = 'CHARGING';
        phasePipeCounter = 0;
        updateStatusText();
        gunAlert.style.display = 'none';
        
        uiStart.classList.remove('hidden'); uiGameOver.classList.add('hidden');
        scoreDisplay.classList.remove('hidden'); introVideo.classList.add('hidden');
    }

    function startGame() { currentState = 'PLAY'; uiStart.classList.add('hidden'); bird.flap(); }

    function inputHandler(e) {
        if (e.type === 'keydown' && e.code !== 'Space') return;
        if (e.type === 'keydown' && e.code === 'Space') e.preventDefault();
        if (currentState === 'HIT' || currentState === 'VIDEO' || currentState === 'OVER') return;

        if (currentState === 'START' && e.target !== startBtn && e.target !== restartBtn) startGame();
        else if (currentState === 'PLAY') bird.flap();
    }

    window.addEventListener('keydown', inputHandler);
    document.getElementById('game-container').addEventListener('mousedown', inputHandler);
    document.getElementById('game-container').addEventListener('touchstart', (e) => {
        if (e.target !== startBtn && e.target !== restartBtn) e.preventDefault();
        inputHandler(e);
    }, {passive: false});

    startBtn.addEventListener('click', (e) => { e.stopPropagation(); startGame(); });
    restartBtn.addEventListener('click', (e) => { e.stopPropagation(); resetGame(); startGame(); });

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        bg.update(); pipes.update(); mysteryBoxes.update(); bird.update(); updateBullets();
        
        pipes.draw(); mysteryBoxes.draw(); bg.draw(); bird.draw(); drawFloatingTexts();
        
        if (currentState === 'PLAY') frames++;
        
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
