<html lang="vi">

<title>Edu Flappy Bird</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
    :root {
        --sky-top: #87CEEB;
        --sky-bottom: #E0F6FF;
        --primary: #FF7E67;
        --primary-dark: #E66A55;
        --text: #2C3E50;
        --bg-glass: rgba(255, 255, 255, 0.9);
    }

    * { box-sizing: border-box; user-select: none; }

    body {
        margin: 0; padding: 0;
        background-color: #1a1a2e;
        display: flex; justify-content: center; align-items: center;
        height: 100dvh;
        font-family: 'Nunito', sans-serif;
        overflow: hidden;
    }

    #game-container {
        position: relative;
        width: 100%; max-width: 420px;
        height: 100%; max-height: 800px;
        background: linear-gradient(var(--sky-top), var(--sky-bottom));
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    @media (min-width: 421px) {
        #game-container { border-radius: 20px; height: 90dvh; }
    }

    canvas { display: block; width: 100%; height: 100%; }

    .ui-layer {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        z-index: 10; pointer-events: none;
    }

    .modal {
        background: var(--bg-glass);
        backdrop-filter: blur(5px);
        padding: 30px; border-radius: 20px;
        text-align: center; pointer-events: auto;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        border: 2px solid rgba(255,255,255,0.5);
        transform: scale(0.9); opacity: 0;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal.active { transform: scale(1); opacity: 1; }
    .hidden { display: none !important; }

    h1 {
        font-family: 'Fredoka One', cursive;
        color: var(--primary);
        font-size: 2.5rem; margin: 0 0 10px 0;
        text-shadow: 2px 2px 0 #FFF, 0px 4px 10px rgba(0,0,0,0.2);
    }

    p { color: var(--text); font-size: 1.1rem; margin-bottom: 20px; }

    .btn {
        background: var(--primary); color: white;
        border: none; padding: 12px 30px;
        font-size: 1.2rem; font-family: 'Fredoka One', cursive;
        border-radius: 50px; cursor: pointer;
        box-shadow: 0 6px 0 var(--primary-dark), 0 10px 10px rgba(0,0,0,0.2);
        transition: transform 0.1s, box-shadow 0.1s;
        width: 100%; margin-top: 10px;
    }

    .btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--primary-dark); }

    #score-hud {
        position: absolute; top: 15%; left: 0; width: 100%;
        text-align: center; z-index: 5; pointer-events: none;
        font-family: 'Fredoka One', cursive; font-size: 4rem;
        color: white; -webkit-text-stroke: 2px var(--text);
        text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* Quiz Modal Specific */
    #quiz-modal {
        width: 90%; background: white;
        padding: 20px; border-radius: 15px;
        border: 4px solid #4ECDC4;
    }

    #question-text {
        font-size: 1.3rem; font-weight: 800;
        color: var(--text); margin-bottom: 20px;
    }

    .ans-btn {
        background: #F7F9FC; color: var(--text);
        border: 2px solid #E2E8F0; padding: 15px;
        margin: 8px 0; border-radius: 10px;
        font-family: 'Nunito', sans-serif; font-size: 1.1rem;
        font-weight: 600; cursor: pointer;
        width: 100%; text-align: left;
        transition: all 0.2s; pointer-events: auto;
    }

    .ans-btn:hover { background: #E2E8F0; transform: translateX(5px); }
    .ans-btn.correct { background: #4ECDC4; color: white; border-color: #45b7af; }
    .ans-btn.wrong { background: #FF6B6B; color: white; border-color: #e66060; }

    .stats-box {
        display: flex; justify-content: space-around;
        background: #F0F4F8; border-radius: 10px;
        padding: 10px; margin-bottom: 20px;
    }
    .stats-box div { font-weight: 800; font-size: 1.2rem; color: var(--text); }
    .stats-box span { display: block; font-size: 0.8rem; color: #718096; text-transform: uppercase; }
</style>
</head>

<div id="game-container">

    <div class="ui-layer" id="start-screen">
        <div class="modal active">

            <p>Vượt qua ống và trả lời câu hỏi!</p>
            <button class="btn" id="start-btn">CHƠI NGAY</button>
        </div>
    </div>

    <div class="ui-layer hidden" id="quiz-screen">
        <div class="modal" id="quiz-modal">
            <div id="question-text">Question here?</div>
            <div id="answers-container"></div>
        </div>
    </div>

    <div class="ui-layer hidden" id="game-over-screen">
        <div class="modal">
            <h1 style="color: #FF6B6B;">GAME OVER</h1>
            <div class="stats-box">
                <div><span>Điểm</span><span id="final-score" style="color:var(--text); font-size:1.5rem">0</span></div>
                <div><span>Kỷ lục</span><span id="best-score" style="color:var(--text); font-size:1.5rem">0</span></div>

            <button class="btn" id="restart-btn">CHƠI LẠI</button>
        </div>

</div>

    {

    /* ======================================================================= */

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const uiStart = document.getElementById('start-screen');
    const uiQuiz = document.getElementById('quiz-screen');
    const quizModal = document.getElementById('quiz-modal');
    const uiGameOver = document.getElementById('game-over-screen');
    const scoreHud = document.getElementById('score-hud');
    
    const questionText = document.getElementById('question-text');
    const answersContainer = document.getElementById('answers-container');
    const finalScoreEl = document.getElementById('final-score');
    const bestScoreEl = document.getElementById('best-score');
    const failReasonEl = document.getElementById('fail-reason');

    let GAME_WIDTH = canvas.offsetWidth;
    let GAME_HEIGHT = canvas.offsetHeight;
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;

    // Biến trạng thái
    let state = 'START'; // START, PLAY, QUIZ, OVER
    let score = 0;
    let bestScore = localStorage.getItem('flappyEngBest') || 0;
    let frames = 0;
    let currentPipeIndex = null;
    let particles = [];

    // Cấu hình vật lý
    const GRAVITY = 0.25;
    const JUMP = -5.5;
    const SPEED = 2.5;

    // Đối tượng chim
    const bird = {
        x: GAME_WIDTH * 0.2, y: GAME_HEIGHT / 2,
        radius: 14, velocity: 0, rotation: 0, flapFrame: 0,
        
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);

            // Thân chim
            let grad = ctx.createRadialGradient(0, -2, 2, 0, 0, this.radius);
            grad.addColorStop(0, '#FFD166');
            grad.addColorStop(1, '#F4A261');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = '#2C3E50'; ctx.stroke();

            // Mắt
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(6, -4, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#2C3E50';
            ctx.beginPath(); ctx.arc(7, -4, 2, 0, Math.PI * 2); ctx.fill();

            // Mỏ
            ctx.fillStyle = '#E76F51';
            ctx.beginPath(); ctx.moveTo(9, 2); ctx.lineTo(18, 5); ctx.lineTo(9, 8); ctx.closePath();
            ctx.fill(); ctx.stroke();

            // Cánh (chuyển động)
            let wingY = Math.sin(this.flapFrame * 0.5) * 4;
            ctx.fillStyle = '#F4A261';
            ctx.beginPath(); ctx.ellipse(-4, 2 + wingY, 7, 4, -0.2, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();

            ctx.restore();
        },
        update() {
            if (state === 'START') {
                this.y = GAME_HEIGHT / 2 + Math.cos(frames * 0.05) * 10;
                this.rotation = 0;
                this.flapFrame++;
                return;
            }
            if (state === 'PLAY' || state === 'OVER') {
                this.velocity += GRAVITY;
                this.y += this.velocity;
                
                if (this.velocity < 0) {
                    this.rotation = Math.max(-25 * Math.PI / 180, this.rotation - 0.1);
                    this.flapFrame++;
                } else {
                    this.rotation = Math.min(90 * Math.PI / 180, this.rotation + 0.04);
                }

                // Chạm đất
                if (this.y + this.radius >= bg.y) {
                    this.y = bg.y - this.radius;
                    if (state === 'PLAY') triggerGameOver("Chim rơi xuống đất!");
                }
                // Chạm trần
                if (this.y - this.radius <= 0) {
                    this.y = this.radius;
                    this.velocity = 0;
                }
            }
        },
        jump() {
            this.velocity = JUMP;
            createParticles(this.x - 10, this.y, '#FFFFFF', 5);
        },
        reset() {
            this.y = GAME_HEIGHT / 2;
            this.velocity = 0;
            this.rotation = 0;
        }
    };

    // Đối tượng Ống
    const pipes = {
        items: [], w: 60, gap: 160, dx: SPEED,
        
        draw() {
            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                
                let drawPipe = (y, h, isTop) => {
                    let grad = ctx.createLinearGradient(p.x, 0, p.x + this.w, 0);
                    grad.addColorStop(0, '#73BF2E');
                    grad.addColorStop(0.5, '#95E04C');
                    grad.addColorStop(1, '#5B9C20');
                    
                    ctx.fillStyle = grad;
                    ctx.lineWidth = 2; ctx.strokeStyle = '#2C3E50';
                    
                    // Thân ống
                    ctx.fillRect(p.x, y, this.w, h);
                    ctx.strokeRect(p.x, y, this.w, h);
                    
                    // Nắp ống
                    let capY = isTop ? y + h - 24 : y;
                    ctx.fillRect(p.x - 4, capY, this.w + 8, 24);
                    ctx.strokeRect(p.x - 4, capY, this.w + 8, 24);

                    // Highlight
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(p.x + 4, y, 6, h);
                    ctx.fillRect(p.x, capY + 2, this.w, 4);
                };

                drawPipe(0, p.top, true); // Ống trên
                drawPipe(p.bottom, GAME_HEIGHT - p.bottom - bg.h, false); // Ống dưới
                
                // Vòng sáng nếu chưa trả lời
                if (!p.passed && p.x < GAME_WIDTH) {
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.4)';
                    ctx.fillRect(p.x + this.w, 0, 5, GAME_HEIGHT);
                }
            }
        },
        update() {
            if (state !== 'PLAY') return;

            // Sinh ống mới
            if (frames % 100 === 0) {
                let minH = 50;
                let maxH = GAME_HEIGHT - bg.h - this.gap - 50;
                let topH = Math.floor(Math.random() * (maxH - minH + 1) + minH);
                this.items.push({
                    x: GAME_WIDTH,
                    top: topH,
                    bottom: topH + this.gap,
                    passed: false
                });
            }

            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                p.x -= this.dx;

                // Xóa ống cũ
                if (p.x + this.w < -20) {
                    this.items.shift();
                    i--;
                    continue;
                }

                // Va chạm
                if (bird.x + bird.radius - 2 > p.x && bird.x - bird.radius + 2 < p.x + this.w) {
                    if (bird.y - bird.radius + 2 < p.top || bird.y + bird.radius - 2 > p.bottom) {
                        triggerGameOver("Chim đâm trúng ống!");
                    }
                }

                // Vượt ống -> Kích hoạt Quiz
                if (p.x + this.w < bird.x && !p.passed) {
                    p.passed = true;
                    currentPipeIndex = i;
                    triggerQuiz();
                }
            }
        },
        reset() { this.items = []; }
    };

    // Nền đất và mây
    const bg = {
        h: 120, y: GAME_HEIGHT - 120, x: 0, clouds: [],
        init() {
            for(let i=0; i<3; i++) {
                this.clouds.push({x: Math.random() * GAME_WIDTH, y: Math.random() * 200 + 50, s: Math.random() * 0.5 + 0.5});
            }
        },
        draw() {
            // Mây
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            this.clouds.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, 30*c.s, 0, Math.PI*2);
                ctx.arc(c.x + 25*c.s, c.y - 10*c.s, 30*c.s, 0, Math.PI*2);
                ctx.arc(c.x + 50*c.s, c.y, 30*c.s, 0, Math.PI*2);
                ctx.fill();
            });

            // Đất
            ctx.fillStyle = '#D8C99B';
            ctx.fillRect(0, this.y, GAME_WIDTH, this.h);
            ctx.fillStyle = '#73BF2E';
            ctx.fillRect(0, this.y, GAME_WIDTH, 15);
            ctx.lineWidth = 3; ctx.strokeStyle = '#2C3E50';
            ctx.beginPath(); ctx.moveTo(0, this.y); ctx.lineTo(GAME_WIDTH, this.y); ctx.stroke();
            
            // Sọc đất
            ctx.strokeStyle = '#C4B58A'; ctx.lineWidth = 4;
            for(let i = 0; i < GAME_WIDTH + 30; i += 30) {
                ctx.beginPath(); ctx.moveTo(i + this.x, this.y + 15);
                ctx.lineTo(i - 20 + this.x, GAME_HEIGHT); ctx.stroke();
            }
        },
        update() {
            if (state === 'PLAY' || state === 'START') {
                this.x = (this.x - SPEED) % 30;
                this.clouds.forEach(c => {
                    c.x -= SPEED * 0.2 * c.s;
                    if (c.x < -100) { c.x = GAME_WIDTH + 50; c.y = Math.random() * 200 + 50; }
                });
            }
        }
    };

    // Hiệu ứng hạt
    function createParticles(x, y, color, count) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4,
                life: 1, color: color
            });
        }
    }
    
    function updateParticles() {
        for(let i=0; i<particles.length; i++) {
            let p = particles[i];
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
            p.x += p.vx; p.y += p.vy; p.life -= 0.05;
            if(p.life <= 0) { particles.splice(i, 1); i--; }
        }
    }

    // Logic Quiz
    function triggerQuiz() {
        state = 'QUIZ';
        bird.velocity = 0; 
        uiQuiz.classList.remove('hidden');
        setTimeout(() => quizModal.classList.add('active'), 10);

        let qData = QUIZ_DATA[Math.floor(Math.random() * QUIZ_DATA.length)];
        questionText.innerText = qData.question;
        answersContainer.innerHTML = '';

        qData.answers.forEach((ans, index) => {
            let btn = document.createElement('button');
            btn.className = 'ans-btn';
            btn.innerText = ans;
            btn.onclick = () => handleAnswer(btn, index === qData.correctIndex);
            answersContainer.appendChild(btn);
        });
    }

    function handleAnswer(btn, isCorrect) {
        // Disable all buttons
        document.querySelectorAll('.ans-btn').forEach(b => b.style.pointerEvents = 'none');
        
        if (isCorrect) {
            btn.classList.add('correct');
            createParticles(GAME_WIDTH/2, GAME_HEIGHT/2, '#4ECDC4', 20);
            setTimeout(() => {
                score++;
                scoreHud.innerText = score;
                quizModal.classList.remove('active');
                setTimeout(() => {
                    uiQuiz.classList.add('hidden');
                    state = 'PLAY';
                    bird.jump(); // Nhảy nhẹ khi tiếp tục
                }, 300);
            }, 800);
        } else {
            btn.classList.add('wrong');
            setTimeout(() => {
                quizModal.classList.remove('active');
                setTimeout(() => {
                    uiQuiz.classList.add('hidden');
                    triggerGameOver("Trả lời sai!");
                }, 300);
            }, 800);
        }
    }

    function triggerGameOver(reason) {
        if(state === 'OVER') return;
        state = 'OVER';
        createParticles(bird.x, bird.y, '#E76F51', 30);
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('flappyEngBest', bestScore);
        }
        
        scoreHud.classList.add('hidden');
        finalScoreEl.innerText = score;
        bestScoreEl.innerText = bestScore;
        failReasonEl.innerText = reason;
        
        setTimeout(() => {
            uiGameOver.classList.remove('hidden');
            setTimeout(() => uiGameOver.querySelector('.modal').classList.add('active'), 10);
        }, 500);
    }

    function resetGame() {
        bird.reset();
        pipes.reset();
        particles = [];
        score = 0;
        frames = 0;
        scoreHud.innerText = score;
        scoreHud.classList.remove('hidden');
        
        uiGameOver.querySelector('.modal').classList.remove('active');
        setTimeout(() => {
            uiGameOver.classList.add('hidden');
            uiStart.classList.remove('hidden');
            setTimeout(() => uiStart.querySelector('.modal').classList.add('active'), 10);
            state = 'START';
        }, 300);
    }

    // Input
    function handleInput(e) {
        if (e.type === 'keydown' && e.code !== 'Space') return;
        if (e.type === 'keydown') e.preventDefault();
        
        if (state === 'START' && e.target.id !== 'start-btn') {
            uiStart.querySelector('.modal').classList.remove('active');
            setTimeout(() => {
                uiStart.classList.add('hidden');
                state = 'PLAY';
                bird.jump();
            }, 200);
        } else if (state === 'PLAY') {
            bird.jump();
        }
    }

    window.addEventListener('keydown', handleInput);
    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', handleInput, {passive: false});

    document.getElementById('start-btn').addEventListener('click', (e) => {
        handleInput({type: 'click', target: canvas}); // Fake event
    });
    
    document.getElementById('restart-btn').addEventListener('click', resetGame);

    // Xử lý Resize
    window.addEventListener('resize', () => {
        GAME_WIDTH = canvas.offsetWidth;
        GAME_HEIGHT = canvas.offsetHeight;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        bg.y = GAME_HEIGHT - bg.h;
    });

    // Loop
    bg.init();
    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        bg.draw(); bg.update();
        pipes.draw(); pipes.update();
        bird.draw(); bird.update();
        updateParticles();
        
        if(state === 'PLAY' || state === 'START') frames++;
        requestAnimationFrame(loop);
    }
    
    // Đảm bảo font load xong rồi mới loop (tránh lệch chữ ban đầu)
    document.fonts.ready.then(() => loop());

</script>
