<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Zombie English Shooter - Cross Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Jura:wght@500;700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: #0a0a0a;
        --primary: #ff3838;
        --primary-dark: #c0392b;
        --text: #ffffff;
        --accent: #32ff7e;
        --bg-glass: rgba(10, 10, 10, 0.9);
    }

    * { box-sizing: border-box; user-select: none; -webkit-touch-callout: none; }

    body {
        margin: 0; padding: 0;
        background-color: #000;
        display: flex; justify-content: center; align-items: center;
        width: 100vw; height: 100vh;
        font-family: 'Nunito', sans-serif;
        overflow: hidden;
        touch-action: none;
    }

    #game-container {
        position: relative;
        width: 100%; height: 100%;
        max-width: 1000px; max-height: 700px; 
        background-color: var(--bg-color);
        background-image: 
            linear-gradient(rgba(47, 53, 66, 0.4) 1px, transparent 1px),
            linear-gradient(90deg, rgba(47, 53, 66, 0.4) 1px, transparent 1px);
        background-size: 50px 50px;
        overflow: hidden;
        box-shadow: 0 0 50px rgba(255, 56, 56, 0.1);
        border-radius: 12px; border: 2px solid #2f3542; cursor: crosshair;
    }

    canvas { display: block; width: 100%; height: 100%; }

    /* --- MOBILE UI --- */
    #mobile-ui {
        display: none;
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 6;
    }

    @media (hover: none) and (pointer: coarse) {
        #game-container {
            max-width: none; max-height: none; 
            border-radius: 0; border: none; cursor: default;
        }
        #mobile-ui { display: block; } 
    }

    /* Joystick (Trái) */
    #joy-base {
        position: absolute; left: 120px; bottom: 120px;
        width: 130px; height: 130px;
        background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.4);
        border-radius: 50%; transform: translate(-50%, -50%);
        transition: opacity 0.2s; opacity: 0.5;
    }

    #joy-stick {
        position: absolute; top: 50%; left: 50%;
        width: 50px; height: 50px; margin: -25px 0 0 -25px;
        background: rgba(255, 255, 255, 0.6); border-radius: 50%;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    /* Nút nạp đạn (Phải) */
    .action-btn {
        position: absolute;
        border-radius: 50%; background: rgba(255, 255, 255, 0.15);
        border: 2px solid rgba(255, 255, 255, 0.5);
        display: flex; justify-content: center; align-items: center;
        color: white; font-family: 'Jura', sans-serif; font-weight: bold;
        pointer-events: auto; backdrop-filter: blur(4px);
    }
    .action-btn:active { background: rgba(255, 255, 255, 0.4); transform: scale(0.95); }

    #btn-reload { right: 40px; bottom: 40px; width: 70px; height: 70px; font-size: 1.8rem; }

    /* HUD */
    #hud-container {
        position: absolute; top: 15px; left: 15px;
        display: flex; flex-direction: column; gap: 8px;
        z-index: 5; pointer-events: none;
    }

    .hud-box {
        background: rgba(0, 0, 0, 0.6); border-left: 5px solid var(--primary);
        padding: 10px 20px; font-family: 'Jura', sans-serif; font-size: 1.4rem; font-weight: 700;
        color: var(--text); backdrop-filter: blur(5px); pointer-events: auto;
    }
    .hud-box span { color: var(--accent); }
    #ammo-hud { cursor: pointer; pointer-events: auto; }
    #ammo-hud:active { transform: scale(0.95); }

    #reloading-msg {
        position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
        font-family: 'Jura', sans-serif; font-size: 2.2rem; font-weight: 700;
        color: #ff9f43; text-shadow: 0 0 20px rgba(255, 159, 67, 0.8);
        z-index: 8; pointer-events: none; animation: pulse 0.8s infinite;
    }

    @keyframes pulse {
        0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        50% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.95); }
        100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* Modals */
    .ui-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 10; pointer-events: none;
    }

    .modal {
        background: var(--bg-glass); backdrop-filter: blur(10px);
        padding: 35px; border-radius: 16px; text-align: center; pointer-events: auto;
        box-shadow: 0 10px 50px rgba(0,0,0,0.9); border: 2px solid rgba(255, 56, 56, 0.3);
        transform: scale(0.9); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal.active { transform: scale(1); opacity: 1; }
    .hidden { display: none !important; }

    h1 { font-family: 'Jura', sans-serif; color: var(--primary); font-size: 3rem; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; }
    p { color: #ced6e0; font-size: 1.1rem; margin-bottom: 25px; line-height: 1.5; }

    .btn {
        background: rgba(255, 56, 56, 0.1); color: var(--text); border: 2px solid var(--primary);
        padding: 12px 40px; font-size: 1.2rem; font-family: 'Jura', sans-serif; font-weight: 700;
        border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: 0.2s;
    }
    .btn:hover { background: var(--primary); box-shadow: 0 0 20px rgba(255,56,56,0.5); }

    #quiz-modal { width: 95%; max-width: 650px; background: #1e272e; border: 3px solid #576574; max-height: 90vh; overflow-y: auto; }
    #question-text { font-size: 1.4rem; font-weight: 800; color: #f1f2f6; margin-bottom: 20px; }

    .ans-btn {
        background: #2f3542; color: #ffffff; border: 2px solid #57606f; padding: 15px; margin: 8px 0;
        border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 700;
        cursor: pointer; width: 100%; text-align: left; pointer-events: auto; transition: 0.2s;
    }
    .ans-btn:hover { background: #57606f; padding-left: 25px; }
    .ans-btn.correct { background: var(--accent); color: #000; border-color: var(--accent); }
    .ans-btn.wrong { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Yêu cầu xoay ngang trên Mobile */
    #rotate-reminder {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; color: white; display: none; flex-direction: column;
        justify-content: center; align-items: center; z-index: 9999;
        font-family: 'Jura', sans-serif; font-size: 1.5rem; text-align: center; padding: 20px;
    }

    @media screen and (max-width: 1000px) and (orientation: portrait) {
        #rotate-reminder { display: flex; }
        #game-container { display: none; }
    }
</style>
</head>

            </p>

        </div>
    </div>

    <div class="ui-layer hidden" id="quiz-screen">

        </div>
    </div>

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const uiStart = document.getElementById('start-screen');
    const uiQuiz = document.getElementById('quiz-screen');
    const quizModal = document.getElementById('quiz-modal');
    const uiGameOver = document.getElementById('game-over-screen');
    const reloadingMsg = document.getElementById('reloading-msg');
    
    const joyBase = document.getElementById('joy-base');
    const joyStick = document.getElementById('joy-stick');
    const btnReload = document.getElementById('btn-reload');
    
    const scoreVal = document.getElementById('score-val');
    const ammoVal = document.getElementById('ammo-val');
    const questionText = document.getElementById('question-text');
    const answersContainer = document.getElementById('answers-container');
    const finalScoreEl = document.getElementById('final-score');
    const failReasonEl = document.getElementById('fail-reason');

    let GAME_WIDTH = canvas.offsetWidth;
    let GAME_HEIGHT = canvas.offsetHeight;
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;

    let state = 'START'; 
    let score = 0;
    let frames = 0;
    let currentTargetZombie = null;

    let bullets = [];
    let zombies = [];
    let particles = [];
    
    let aimX = GAME_WIDTH / 2;
    let aimY = GAME_HEIGHT / 2;

    const keys = { w: false, a: false, s: false, d: false };

    // Joystick data
    let leftTouchId = null;
    let rightTouchId = null;
    let joystick = { active: false, originX: 0, originY: 0, deltaX: 0, deltaY: 0, maxRadius: 50 };

    const player = {
        x: GAME_WIDTH / 2, y: GAME_HEIGHT / 2, 
        radius: 16, angle: 0, speed: 4,
        maxAmmo: 20, ammo: 20, isReloading: false,
        fireTimer: 0, fireRate: 10, // Thông số tự động bắn
        
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);

            let gradient = ctx.createRadialGradient(20, 0, 0, 20, 0, 400);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.2)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(400, -100); ctx.lineTo(400, 100); ctx.fill();

            ctx.fillStyle = '#747d8c'; ctx.fillRect(10, -5, 35, 10);
            ctx.fillStyle = '#2f3542'; ctx.fillRect(10, -7, 15, 14);
            ctx.fillStyle = '#2f3542';
            ctx.beginPath(); ctx.ellipse(0, 0, 14, 20, 0, 0, Math.PI*2); ctx.fill();

            ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#d2dae2'; ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = '#1e272e'; ctx.stroke();

            ctx.fillStyle = '#0fb9b1';
            ctx.beginPath(); ctx.arc(6, -6, 4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(6, 6, 4, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        },
        update() {
            // Mobile Movement
            if (joystick.active) {
                let dist = Math.hypot(joystick.deltaX, joystick.deltaY);
                let speedMult = Math.min(dist / joystick.maxRadius, 1);
                if (speedMult > 0) {
                    let moveAngle = Math.atan2(joystick.deltaY, joystick.deltaX);
                    this.x += Math.cos(moveAngle) * (this.speed * speedMult);
                    this.y += Math.sin(moveAngle) * (this.speed * speedMult);
                }
            } else {
                // PC Movement
                if(keys.w) this.y -= this.speed;
                if(keys.s) this.y += this.speed;
                if(keys.a) this.x -= this.speed;
                if(keys.d) this.x += this.speed;
            }

            this.x = Math.max(this.radius, Math.min(GAME_WIDTH - this.radius, this.x));
            this.y = Math.max(this.radius, Math.min(GAME_HEIGHT - this.radius, this.y));

            let dx = aimX - this.x;
            let dy = aimY - this.y;
            this.angle = Math.atan2(dy, dx);

            // AUTO-SHOOT CHO MOBILE KHI ĐANG NGẮM
            if (this.fireTimer > 0) this.fireTimer--;
            if (rightTouchId !== null && !this.isReloading && this.fireTimer === 0 && state === 'PLAY') {
                this.shoot();
                this.fireTimer = this.fireRate; // Reset thời gian chờ giữa các viên đạn
            }
        },
        shoot() {
            if (this.isReloading || state !== 'PLAY') return;
            if (this.ammo > 0) {
                this.ammo--; updateAmmoDisplay();
                let bSpeed = 20;
                let dx = Math.cos(this.angle) * bSpeed; let dy = Math.sin(this.angle) * bSpeed;
                
                bullets.push({
                    x: this.x + Math.cos(this.angle) * 40, y: this.y + Math.sin(this.angle) * 40,
                    vx: dx, vy: dy, radius: 4
                });
                
                createParticles(this.x + Math.cos(this.angle) * 40, this.y + Math.sin(this.angle) * 40, '#feca57', 8, 4);
                if (this.ammo === 0) this.reload();
            } else {
                this.reload();
            }
        },
        reload() {
            if (this.isReloading || this.ammo === this.maxAmmo || state !== 'PLAY') return;
            this.isReloading = true; reloadingMsg.classList.remove('hidden');
            
            setTimeout(() => {
                this.ammo = this.maxAmmo; this.isReloading = false;
                updateAmmoDisplay(); reloadingMsg.classList.add('hidden');
            }, 1000);
        }
    };

    function updateAmmoDisplay() {
        ammoVal.innerText = `${player.ammo}/${player.maxAmmo}`;
        ammoVal.style.color = player.ammo <= 5 ? '#ff4757' : '#ff9f43';
    }

    function spawnZombie() {
        let isBig = Math.random() > 0.8;
        let size = isBig ? Math.random() * 6 + 25 : Math.random() * 5 + 18; 
        let speed = isBig ? Math.random() * 0.4 + 0.5 : Math.random() * 1.0 + 1.0;
        speed += (score * 0.02); 
        let hp = (isBig ? 5 : 2) + Math.floor(score / 5);
        let edge = Math.floor(Math.random() * 4);
        let zx, zy, offset = 50;

        if (edge === 0) { zx = Math.random() * GAME_WIDTH; zy = -offset; }
        else if (edge === 1) { zx = GAME_WIDTH + offset; zy = Math.random() * GAME_HEIGHT; }
        else if (edge === 2) { zx = Math.random() * GAME_WIDTH; zy = GAME_HEIGHT + offset; }
        else { zx = -offset; zy = Math.random() * GAME_HEIGHT; }

        zombies.push({ x: zx, y: zy, radius: size, speed: speed, maxHp: hp, hp: hp, hitTimer: 0 });
    }

    function drawZombies() {
        zombies.forEach(z => {
            ctx.save(); ctx.translate(z.x, z.y);
            let angle = Math.atan2(player.y - z.y, player.x - z.x); ctx.rotate(angle);
            
            ctx.fillStyle = z.hitTimer > 0 ? '#ffb8b8' : '#05c46b';
            ctx.fillRect(4, -z.radius + 2, 20, 8); ctx.fillRect(4, z.radius - 10, 20, 8);
            ctx.beginPath(); ctx.ellipse(0, 0, z.radius*0.8, z.radius*1.15, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(0, 0, z.radius * 0.85, 0, Math.PI * 2);
            ctx.fillStyle = z.hitTimer > 0 ? '#ff3838' : '#0be881'; ctx.fill();
            ctx.lineWidth = 1.5; ctx.strokeStyle = '#000'; ctx.stroke();

            ctx.rotate(-angle);
            let hpWidth = z.radius * 2; let hpRatio = Math.max(0, z.hp / z.maxHp);
            ctx.fillStyle = '#ff3838'; ctx.fillRect(-hpWidth/2, -z.radius - 15, hpWidth, 4);
            ctx.fillStyle = '#32ff7e'; ctx.fillRect(-hpWidth/2, -z.radius - 15, hpWidth * hpRatio, 4);
            ctx.strokeStyle = '#000'; ctx.strokeRect(-hpWidth/2, -z.radius - 15, hpWidth, 4);

            ctx.restore();
            if (z.hitTimer > 0) z.hitTimer--;
        });
    }

    function updateZombies() {
        if (frames % Math.max(25, 80 - score * 2) === 0) spawnZombie();
        for (let i = 0; i < zombies.length; i++) {
            let z = zombies[i];
            let angle = Math.atan2(player.y - z.y, player.x - z.x);
            z.x += Math.cos(angle) * z.speed; z.y += Math.sin(angle) * z.speed;
            if (Math.hypot(player.x - z.x, player.y - z.y) < player.radius + z.radius - 4) {
                triggerGameOver("Zombie đã cắn bạn!"); return;
            }
        }
    }

    function drawBullets() {
        bullets.forEach(b => {
            ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff'; ctx.fill();
        });
    }

    function updateBullets() {
        for (let i = 0; i < bullets.length; i++) {
            let b = bullets[i];
            b.x += b.vx; b.y += b.vy;
            if (b.x < 0 || b.x > GAME_WIDTH || b.y < 0 || b.y > GAME_HEIGHT) { bullets.splice(i, 1); i--; continue; }

            for (let j = 0; j < zombies.length; j++) {
                let z = zombies[j];
                if (Math.hypot(b.x - z.x, b.y - z.y) < b.radius + z.radius) {
                    bullets.splice(i, 1); i--;
                    z.hp--; z.hitTimer = 4;
                    createParticles(b.x, b.y, '#0be881', 6, 3);
                    if (z.hp <= 0) { currentTargetZombie = z; triggerQuiz(); }
                    break;
                }
            }
        }
    }

    function createParticles(x, y, color, count, speedMult) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y, vx: (Math.random() - 0.5) * speedMult * 4, vy: (Math.random() - 0.5) * speedMult * 4,
                life: 1, color: color, size: Math.random() * 3 + 1
            });
        }
    }
    
    function updateParticles() {
        for(let i=0; i<particles.length; i++) {
            let p = particles[i];
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1; p.x += p.vx; p.y += p.vy; p.life -= 0.04;
            if(p.life <= 0) { particles.splice(i, 1); i--; }
        }
    }

    function triggerQuiz() {
        state = 'QUIZ'; resetInputs();
        uiQuiz.classList.remove('hidden');
        setTimeout(() => quizModal.classList.add('active'), 10);

        let qData = QUIZ_DATA[Math.floor(Math.random() * QUIZ_DATA.length)];
        questionText.innerText = qData.question;
        answersContainer.innerHTML = '';

        qData.answers.forEach((ans, index) => {
            let btn = document.createElement('button');
            btn.className = 'ans-btn'; btn.innerText = ans;
            btn.onclick = () => handleAnswer(btn, index === qData.correctIndex);
            answersContainer.appendChild(btn);
        });
    }

    function handleAnswer(btn, isCorrect) {
        document.querySelectorAll('.ans-btn').forEach(b => b.style.pointerEvents = 'none');
        if (isCorrect) {
            btn.classList.add('correct');
            if(currentTargetZombie) {
                createParticles(currentTargetZombie.x, currentTargetZombie.y, '#32ff7e', 30, 4);
                zombies = zombies.filter(z => z !== currentTargetZombie);
            }
            currentTargetZombie = null;
            setTimeout(() => {
                score++; scoreVal.innerText = score;
                quizModal.classList.remove('active');
                setTimeout(() => { uiQuiz.classList.add('hidden'); state = 'PLAY'; }, 300);
            }, 500);
        } else {
            btn.classList.add('wrong');
            setTimeout(() => {
                quizModal.classList.remove('active');
                setTimeout(() => {
                    uiQuiz.classList.add('hidden');
                    if(currentTargetZombie) {
                        currentTargetZombie.hp = currentTargetZombie.maxHp;
                        let angle = Math.atan2(currentTargetZombie.y - player.y, currentTargetZombie.x - player.x);
                        currentTargetZombie.x += Math.cos(angle) * 120; currentTargetZombie.y += Math.sin(angle) * 120;
                        currentTargetZombie = null;
                    }
                    state = 'PLAY';
                }, 300);
            }, 600);
        }
    }

    function triggerGameOver(reason) {
        if(state === 'OVER') return;
        state = 'OVER'; resetInputs();
        createParticles(player.x, player.y, '#ff3838', 60, 5); 
        reloadingMsg.classList.add('hidden');
        finalScoreEl.innerText = score; failReasonEl.innerText = reason;
        setTimeout(() => {
            uiGameOver.classList.remove('hidden');
            setTimeout(() => uiGameOver.querySelector('.modal').classList.add('active'), 10);
        }, 600);
    }

    function startGame() {
        uiStart.querySelector('.modal').classList.remove('active');
        setTimeout(() => { uiStart.classList.add('hidden'); state = 'PLAY'; }, 200);
    }

    function resetGame() {
        zombies = []; bullets = []; particles = [];
        score = 0; frames = 0;
        player.x = GAME_WIDTH / 2; player.y = GAME_HEIGHT / 2;
        player.ammo = player.maxAmmo; player.isReloading = false;
        resetInputs();
        
        scoreVal.innerText = score; updateAmmoDisplay();
        uiGameOver.querySelector('.modal').classList.remove('active');
        setTimeout(() => { uiGameOver.classList.add('hidden'); startGame(); }, 300);
    }

    function resetInputs() {
        keys.w = keys.a = keys.s = keys.d = false;
        leftTouchId = null; rightTouchId = null;
        joystick.active = false; joystick.deltaX = 0; joystick.deltaY = 0;
        joyBase.style.left = '120px'; joyBase.style.top = (GAME_HEIGHT - 120) + 'px';
        joyBase.style.opacity = '0.5'; joyStick.style.transform = `translate(0px, 0px)`;
    }

    function getCanvasPos(e) {
        let rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    // --- PC MOUSE EVENTS ---
    canvas.addEventListener('mousemove', e => {
        if (!joystick.active && rightTouchId === null) {
            let pos = getCanvasPos(e); aimX = pos.x; aimY = pos.y;
        }
    });
    canvas.addEventListener('mousedown', e => {
        // Chỉ nhận click chuột trên PC (không phải chạm màn hình)
        if (e.pointerType === 'touch' || e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) return;
        
        if (state === 'PLAY') {
            let pos = getCanvasPos(e); aimX = pos.x; aimY = pos.y;
            player.shoot();
        } else if (state === 'START') startGame();
    });

    // --- PC KEYBOARD EVENTS ---
    window.addEventListener('keydown', e => {
        let key = e.key.toLowerCase();
        if(key === 'w' || e.key === 'ArrowUp') keys.w = true;
        if(key === 's' || e.key === 'ArrowDown') keys.s = true;
        if(key === 'a' || e.key === 'ArrowLeft') keys.a = true;
        if(key === 'd' || e.key === 'ArrowRight') keys.d = true;
        if(key === 'r') player.reload();
    });
    window.addEventListener('keyup', e => {
        let key = e.key.toLowerCase();
        if(key === 'w' || e.key === 'ArrowUp') keys.w = false;
        if(key === 's' || e.key === 'ArrowDown') keys.s = false;
        if(key === 'a' || e.key === 'ArrowLeft') keys.a = false;
        if(key === 'd' || e.key === 'ArrowRight') keys.d = false;
    });

    // --- MOBILE TOUCH EVENTS ---
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        if (state === 'START') { startGame(); return; }
        if (state !== 'PLAY') return;
        
        for (let touch of e.changedTouches) {
            let pos = getCanvasPos(touch);
            if (pos.x < GAME_WIDTH / 2) {
                if (leftTouchId === null) {
                    leftTouchId = touch.identifier;
                    joystick.active = true;
                    joystick.originX = pos.x; joystick.originY = pos.y;
                    joystick.deltaX = 0; joystick.deltaY = 0;
                    joyBase.style.left = pos.x + 'px'; joyBase.style.top = pos.y + 'px';
                    joyBase.style.opacity = '1';
                }
            } else {
                if (rightTouchId === null) { rightTouchId = touch.identifier; aimX = pos.x; aimY = pos.y; }
            }
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (state !== 'PLAY') return;
        for (let touch of e.changedTouches) {
            let pos = getCanvasPos(touch);
            if (touch.identifier === leftTouchId) {
                let dx = pos.x - joystick.originX; let dy = pos.y - joystick.originY;
                let dist = Math.hypot(dx, dy);
                if (dist > joystick.maxRadius) {
                    let angle = Math.atan2(dy, dx);
                    joystick.deltaX = Math.cos(angle) * joystick.maxRadius;
                    joystick.deltaY = Math.sin(angle) * joystick.maxRadius;
                } else {
                    joystick.deltaX = dx; joystick.deltaY = dy;
                }
                joyStick.style.transform = `translate(${joystick.deltaX}px, ${joystick.deltaY}px)`;
            } else if (touch.identifier === rightTouchId) {
                aimX = pos.x; aimY = pos.y;
            }
        }
    }, {passive: false});

    function handleTouchEnd(e) {
        e.preventDefault();
        for (let touch of e.changedTouches) {
            if (touch.identifier === leftTouchId) {
                leftTouchId = null; joystick.active = false;
                joystick.deltaX = 0; joystick.deltaY = 0;
                joyBase.style.left = '120px'; joyBase.style.top = (GAME_HEIGHT - 120) + 'px';
                joyBase.style.opacity = '0.5'; joyStick.style.transform = `translate(0px, 0px)`;
            } else if (touch.identifier === rightTouchId) { rightTouchId = null; }
        }
    }
    canvas.addEventListener('touchend', handleTouchEnd);
    canvas.addEventListener('touchcancel', handleTouchEnd);

    // --- NÚT UI CHUNG ---
    btnReload.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); player.reload(); }, {passive: false});
    btnReload.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); player.reload(); });
    document.getElementById('ammo-hud').addEventListener('touchstart', e => { e.preventDefault(); player.reload(); }, {passive: false});
    document.getElementById('ammo-hud').addEventListener('mousedown', e => { player.reload(); });
    
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', resetGame);

    function resizeCanvas() {
        GAME_WIDTH = canvas.offsetWidth;
        GAME_HEIGHT = canvas.offsetHeight;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        if (!joystick.active) { joyBase.style.left = '120px'; joyBase.style.top = (GAME_HEIGHT - 120) + 'px'; }
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); 

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        updateParticles();
        
        if (state === 'PLAY' || state === 'OVER') {
            if (state === 'PLAY') { player.update(); updateBullets(); updateZombies(); frames++; }
            drawBullets(); drawZombies();
            if (state !== 'OVER' || particles.length > 0) player.draw();
        } else if (state === 'START' || state === 'QUIZ') {
            drawBullets(); drawZombies(); player.draw();
        }
        requestAnimationFrame(loop);
    }
    document.fonts.ready.then(() => loop());
</script>
</body>
</html>
