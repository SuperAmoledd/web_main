<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Zombie English Shooter - Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Jura:wght@500;700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: #0a0a0a;
        --primary: #ff3838;
        --primary-dark: #c0392b;
        --text: #ffffff;
        --accent: #32ff7e;
        --bg-glass: rgba(10, 10, 10, 0.9);
    }

    * { box-sizing: border-box; user-select: none; -webkit-touch-callout: none; }

    body {
        margin: 0; padding: 0;
        background-color: #000;
        display: flex; justify-content: center; align-items: center;
        width: 100vw; height: 100vh;
        font-family: 'Nunito', sans-serif;
        overflow: hidden;
        touch-action: none; /* Vô hiệu hóa cuộn trang */
    }

    #game-container {
        position: relative;
        width: 100%; height: 100%;
        background-color: var(--bg-color);
        background-image: 
            linear-gradient(rgba(47, 53, 66, 0.4) 1px, transparent 1px),
            linear-gradient(90deg, rgba(47, 53, 66, 0.4) 1px, transparent 1px);
        background-size: 50px 50px;
        overflow: hidden;
    }

    canvas { display: block; width: 100%; height: 100%; }

    /* Lớp giao diện Mobile */
    #mobile-ui {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 6;
    }

    /* Joystick di chuyển (Trái) */
    #joy-base {
        position: absolute; left: 120px; bottom: 120px;
        width: 130px; height: 130px;
        background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.4);
        border-radius: 50%; transform: translate(-50%, -50%);
        transition: opacity 0.2s; opacity: 0.5;
    }

    #joy-stick {
        position: absolute; top: 50%; left: 50%;
        width: 50px; height: 50px; margin: -25px 0 0 -25px;
        background: rgba(255, 255, 255, 0.6); border-radius: 50%;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    /* Các nút hành động (Phải) */
    .action-btn {
        position: absolute;
        border-radius: 50%; background: rgba(255, 255, 255, 0.15);
        border: 2px solid rgba(255, 255, 255, 0.5);
        display: flex; justify-content: center; align-items: center;
        color: white; font-family: 'Jura', sans-serif; font-weight: bold;
        pointer-events: auto; backdrop-filter: blur(4px);
    }
    .action-btn:active { background: rgba(255, 255, 255, 0.4); transform: scale(0.95); }

    #btn-shoot {
        right: 40px; bottom: 40px; width: 90px; height: 90px;
    }
    #btn-shoot svg { width: 50px; height: 50px; fill: white; }

    #btn-reload {
        right: 150px; bottom: 60px; width: 65px; height: 65px; font-size: 1.8rem;
    }

    /* Giao diện trạng thái */
    #hud-container {
        position: absolute; top: 15px; left: 15px;
        display: flex; flex-direction: column; gap: 8px;
        z-index: 5; pointer-events: none;
    }

    .hud-box {
        background: rgba(0, 0, 0, 0.6); border-left: 5px solid var(--primary);
        padding: 8px 15px; font-family: 'Jura', sans-serif; font-size: 1.2rem; font-weight: 700;
        color: var(--text); backdrop-filter: blur(5px); pointer-events: auto;
    }

    .hud-box span { color: var(--accent); }

    #reloading-msg {
        position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
        font-family: 'Jura', sans-serif; font-size: 2rem; font-weight: 700;
        color: #ff9f43; text-shadow: 0 0 15px rgba(255, 159, 67, 0.8);
        z-index: 8; pointer-events: none; animation: pulse 0.8s infinite;
    }

    @keyframes pulse {
        0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        50% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.95); }
        100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* Modals */
    .ui-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 10; pointer-events: none;
    }

    .modal {
        background: var(--bg-glass); backdrop-filter: blur(10px);
        padding: 30px; border-radius: 16px; text-align: center; pointer-events: auto;
        box-shadow: 0 10px 50px rgba(0,0,0,0.9); border: 2px solid rgba(255, 56, 56, 0.3);
        transform: scale(0.9); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal.active { transform: scale(1); opacity: 1; }
    .hidden { display: none !important; }

    h1 { font-family: 'Jura', sans-serif; color: var(--primary); font-size: 2.5rem; margin: 0 0 10px 0; }
    p { color: #ced6e0; font-size: 1rem; margin-bottom: 20px; line-height: 1.5; }

    .btn {
        background: rgba(255, 56, 56, 0.1); color: var(--text); border: 2px solid var(--primary);
        padding: 12px 40px; font-size: 1.2rem; font-family: 'Jura', sans-serif; font-weight: 700;
        border-radius: 8px; cursor: pointer; text-transform: uppercase;
    }

    #quiz-modal { width: 90%; max-width: 600px; background: #1e272e; border: 3px solid #576574; max-height: 90vh; overflow-y: auto; }
    #question-text { font-size: 1.2rem; font-weight: 800; color: #f1f2f6; margin-bottom: 20px; }

    .ans-btn {
        background: #2f3542; color: #ffffff; border: 2px solid #57606f; padding: 12px; margin: 6px 0;
        border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700;
        cursor: pointer; width: 100%; text-align: left; pointer-events: auto;
    }
    .ans-btn.correct { background: var(--accent); color: #000; border-color: var(--accent); }
    .ans-btn.wrong { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Ép xoay màn hình */
    #rotate-reminder {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; color: white; display: none; flex-direction: column;
        justify-content: center; align-items: center; z-index: 9999;
        font-family: 'Jura', sans-serif; font-size: 1.5rem; text-align: center; padding: 20px;
    }

    @media screen and (orientation: portrait) {
        #rotate-reminder { display: flex; }
        #game-container { display: none; }
    }
</style>
</head>
<body>

<div id="rotate-reminder">
    <svg viewBox="0 0 24 24" fill="white" width="60" height="60" style="margin-bottom: 20px;">
        <path d="M16.48,2.52C17.15,1.85 18.27,1.85 18.95,2.52L21.46,5.04C22.14,5.71 22.14,6.83 21.46,7.5L9.61,19.35C8.94,20.03 7.82,20.03 7.14,19.35L4.63,16.84C3.95,16.16 3.95,15.04 4.63,14.37L16.48,2.52M17.71,3.75L5.86,15.61L8.37,18.12L20.23,6.27L17.71,3.75M5,17.5C5,17.5 3.5,16 2.5,16C1.67,16 1,16.67 1,17.5C1,18.33 1.67,19 2.5,19C3.5,19 4,20.5 4,20.5V23H6V20.5C6,19 7.5,19 7.5,19L5,17.5M19,6.5C19,6.5 20.5,8 21.5,8C22.33,8 23,7.33 23,6.5C23,5.67 22.33,5 21.5,5C20.5,5 20,3.5 20,3.5V1H18V3.5C18,5 16.5,5 16.5,5L19,6.5Z" />
    </svg>
    VUI LÒNG XOAY NGANG THIẾT BỊ ĐỂ CHƠI
</div>

<div id="game-container">
    <div id="hud-container">
        <div class="hud-box">SCORE: <span id="score-val">0</span></div>
        <div class="hud-box" id="ammo-hud" style="border-left-color: #ff9f43;">
            AMMO: <span id="ammo-val" style="color: #ff9f43;">20/20</span>
        </div>
    </div>
    
    <div id="reloading-msg" class="hidden">RELOADING...</div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="mobile-ui">
        <div id="joy-base"><div id="joy-stick"></div></div>
        <div id="btn-reload" class="action-btn">R</div>
        <div id="btn-shoot" class="action-btn">
            <svg viewBox="0 0 24 24">
                <path d="M5,2H19A3,3 0 0,1 22,5V9A3,3 0 0,1 19,12H17.82L17.2,14.47C16.89,15.71 15.69,16.5 14.39,16.5H13.63C12.43,16.5 11.37,15.79 10.93,14.67L9.54,11.23H6.5V14.5A1.5,1.5 0 0,1 5,16H4V21H2V5A3,3 0 0,1 5,2M6.5,5V8H10.15L11.5,11.33C11.66,11.72 12,12 12.42,12H14.39C14.86,12 15.28,11.72 15.4,11.26L16.27,7.74C16.4,7.24 16,6.75 15.5,6.75H13V5H6.5Z" />
            </svg>
        </div>
    </div>

    <div class="ui-layer" id="start-screen">
        <div class="modal active">
            <h1>SURVIVAL ENGLISH</h1>
            <p>
                <b>Trái:</b> Joystick di chuyển<br>
                <b>Phải:</b> Vuốt để ngắm, nút để Bắn & Nạp Đạn
            </p>
            <button class="btn" id="start-btn">CHIẾN ĐẤU</button>
        </div>
    </div>

    <div class="ui-layer hidden" id="quiz-screen">
        <div class="modal" id="quiz-modal">
            <div id="question-text">Question here?</div>
            <div id="answers-container"></div>
        </div>
    </div>

    <div class="ui-layer hidden" id="game-over-screen">
        <div class="modal">
            <h1 style="color: var(--primary);">BẠN ĐÃ TỬ TRẬN</h1>
            <div style="font-size: 1.5rem; color: #fff; margin-bottom: 10px;">Điểm: <span id="final-score" style="color:var(--accent);">0</span></div>
            <p id="fail-reason" style="font-size: 1rem; color: #ff6b81; font-weight: bold;"></p>
            <button class="btn" id="restart-btn">THỬ LẠI</button>
        </div>
    </div>
</div>

<script>
    const QUIZ_DATA = [
        { question: "I ___ a student at a local university.", answers: ["am", "is", "are", "be"], correctIndex: 0 },
        { question: "They ___ to the cinema every Saturday.", answers: ["goes", "go", "going", "went"], correctIndex: 1 },
        { question: "Look! The bus ___.", answers: ["is coming", "comes", "come", "has come"], correctIndex: 0 },
        { question: "I don't have ___ money in my pocket.", answers: ["some", "any", "many", "a"], correctIndex: 1 },
        { question: "This book is ___ than that one.", answers: ["more cheap", "cheaper", "cheapier", "more cheaper"], correctIndex: 1 },
        { question: "Where ___ you born?", answers: ["did", "was", "were", "are"], correctIndex: 2 },
        { question: "He ___ breakfast at 7 AM yesterday.", answers: ["had", "has", "eats", "have"], correctIndex: 0 },
        { question: "Từ nào trái nghĩa với 'Hot'?", answers: ["Warm", "Cold", "Sunny", "Dry"], correctIndex: 1 },
        { question: "She is interested ___ learning English.", answers: ["on", "at", "in", "for"], correctIndex: 2 },
        { question: "How ___ apples do you need?", answers: ["much", "many", "long", "often"], correctIndex: 1 },
        { question: "If I ___ you, I would take that job offer.", answers: ["am", "was", "were", "had been"], correctIndex: 2 },
        { question: "He has been working here ___ 2010.", answers: ["for", "since", "during", "in"], correctIndex: 1 }
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const uiStart = document.getElementById('start-screen');
    const uiQuiz = document.getElementById('quiz-screen');
    const quizModal = document.getElementById('quiz-modal');
    const uiGameOver = document.getElementById('game-over-screen');
    const reloadingMsg = document.getElementById('reloading-msg');
    const mobileUI = document.getElementById('mobile-ui');
    
    const joyBase = document.getElementById('joy-base');
    const joyStick = document.getElementById('joy-stick');
    const btnShoot = document.getElementById('btn-shoot');
    const btnReload = document.getElementById('btn-reload');
    
    const scoreVal = document.getElementById('score-val');
    const ammoVal = document.getElementById('ammo-val');
    const questionText = document.getElementById('question-text');
    const answersContainer = document.getElementById('answers-container');
    const finalScoreEl = document.getElementById('final-score');
    const failReasonEl = document.getElementById('fail-reason');

    let GAME_WIDTH = window.innerWidth;
    let GAME_HEIGHT = window.innerHeight;
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;

    let state = 'START'; 
    let score = 0;
    let frames = 0;
    let currentTargetZombie = null;

    let bullets = [];
    let zombies = [];
    let particles = [];
    
    let aimX = GAME_WIDTH / 2;
    let aimY = GAME_HEIGHT / 2;

    const keys = { w: false, a: false, s: false, d: false };

    // Joystick dữ liệu
    let leftTouchId = null;
    let rightTouchId = null;
    let joystick = { active: false, originX: 0, originY: 0, deltaX: 0, deltaY: 0, maxRadius: 50 };

    const player = {
        x: GAME_WIDTH / 2, y: GAME_HEIGHT / 2, 
        radius: 16, angle: 0, speed: 3.5,
        maxAmmo: 20, ammo: 20, isReloading: false,
        
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);

            // Đèn pin
            let gradient = ctx.createRadialGradient(20, 0, 0, 20, 0, 300);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.2)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(350, -100); ctx.lineTo(350, 100); ctx.fill();

            // Súng & Thân
            ctx.fillStyle = '#747d8c'; ctx.fillRect(10, -5, 35, 10);
            ctx.fillStyle = '#2f3542'; ctx.fillRect(10, -7, 15, 14);
            ctx.fillStyle = '#2f3542';
            ctx.beginPath(); ctx.ellipse(0, 0, 14, 20, 0, 0, Math.PI*2); ctx.fill();

            // Đầu
            ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#d2dae2'; ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = '#1e272e'; ctx.stroke();

            // Mắt
            ctx.fillStyle = '#0fb9b1';
            ctx.beginPath(); ctx.arc(6, -6, 4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(6, 6, 4, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        },
        update() {
            if (joystick.active) {
                let dist = Math.hypot(joystick.deltaX, joystick.deltaY);
                let speedMult = Math.min(dist / joystick.maxRadius, 1);
                if (speedMult > 0) {
                    let moveAngle = Math.atan2(joystick.deltaY, joystick.deltaX);
                    this.x += Math.cos(moveAngle) * (this.speed * speedMult);
                    this.y += Math.sin(moveAngle) * (this.speed * speedMult);
                }
            } else {
                if(keys.w) this.y -= this.speed;
                if(keys.s) this.y += this.speed;
                if(keys.a) this.x -= this.speed;
                if(keys.d) this.x += this.speed;
            }

            this.x = Math.max(this.radius, Math.min(GAME_WIDTH - this.radius, this.x));
            this.y = Math.max(this.radius, Math.min(GAME_HEIGHT - this.radius, this.y));

            let dx = aimX - this.x;
            let dy = aimY - this.y;
            this.angle = Math.atan2(dy, dx);
        },
        shoot() {
            if (this.isReloading || state !== 'PLAY') return;
            if (this.ammo > 0) {
                this.ammo--;
                updateAmmoDisplay();
                
                let bSpeed = 18;
                let dx = Math.cos(this.angle) * bSpeed;
                let dy = Math.sin(this.angle) * bSpeed;
                
                bullets.push({
                    x: this.x + Math.cos(this.angle) * 40,
                    y: this.y + Math.sin(this.angle) * 40,
                    vx: dx, vy: dy, radius: 3
                });
                
                createParticles(this.x + Math.cos(this.angle) * 40, this.y + Math.sin(this.angle) * 40, '#feca57', 8, 4);
                if (this.ammo === 0) this.reload();
            } else {
                this.reload();
            }
        },
        reload() {
            if (this.isReloading || this.ammo === this.maxAmmo || state !== 'PLAY') return;
            this.isReloading = true;
            reloadingMsg.classList.remove('hidden');
            
            setTimeout(() => {
                this.ammo = this.maxAmmo;
                this.isReloading = false;
                updateAmmoDisplay();
                reloadingMsg.classList.add('hidden');
            }, 1000);
        }
    };

    function updateAmmoDisplay() {
        ammoVal.innerText = `${player.ammo}/${player.maxAmmo}`;
        ammoVal.style.color = player.ammo <= 5 ? '#ff4757' : '#ff9f43';
    }

    function spawnZombie() {
        let isBig = Math.random() > 0.8;
        let size = isBig ? Math.random() * 6 + 25 : Math.random() * 5 + 18; 
        let speed = isBig ? Math.random() * 0.4 + 0.5 : Math.random() * 1.0 + 1.0;
        speed += (score * 0.02); 
        
        let hp = (isBig ? 5 : 2) + Math.floor(score / 5);
        let edge = Math.floor(Math.random() * 4);
        let zx, zy, offset = 50;

        if (edge === 0) { zx = Math.random() * GAME_WIDTH; zy = -offset; }
        else if (edge === 1) { zx = GAME_WIDTH + offset; zy = Math.random() * GAME_HEIGHT; }
        else if (edge === 2) { zx = Math.random() * GAME_WIDTH; zy = GAME_HEIGHT + offset; }
        else { zx = -offset; zy = Math.random() * GAME_HEIGHT; }

        zombies.push({ x: zx, y: zy, radius: size, speed: speed, maxHp: hp, hp: hp, hitTimer: 0 });
    }

    function drawZombies() {
        zombies.forEach(z => {
            ctx.save(); ctx.translate(z.x, z.y);
            let angle = Math.atan2(player.y - z.y, player.x - z.x);
            ctx.rotate(angle);
            
            ctx.fillStyle = z.hitTimer > 0 ? '#ffb8b8' : '#05c46b';
            ctx.fillRect(4, -z.radius + 2, 20, 8); ctx.fillRect(4, z.radius - 10, 20, 8);
            ctx.beginPath(); ctx.ellipse(0, 0, z.radius*0.8, z.radius*1.15, 0, 0, Math.PI*2); ctx.fill();
            
            ctx.beginPath(); ctx.arc(0, 0, z.radius * 0.85, 0, Math.PI * 2);
            ctx.fillStyle = z.hitTimer > 0 ? '#ff3838' : '#0be881'; ctx.fill();
            ctx.lineWidth = 1.5; ctx.strokeStyle = '#000'; ctx.stroke();

            ctx.rotate(-angle);
            let hpWidth = z.radius * 2;
            let hpRatio = Math.max(0, z.hp / z.maxHp);
            ctx.fillStyle = '#ff3838'; ctx.fillRect(-hpWidth/2, -z.radius - 15, hpWidth, 4);
            ctx.fillStyle = '#32ff7e'; ctx.fillRect(-hpWidth/2, -z.radius - 15, hpWidth * hpRatio, 4);
            ctx.strokeStyle = '#000'; ctx.strokeRect(-hpWidth/2, -z.radius - 15, hpWidth, 4);

            ctx.restore();
            if (z.hitTimer > 0) z.hitTimer--;
        });
    }

    function updateZombies() {
        if (frames % Math.max(30, 90 - score * 2) === 0) spawnZombie();

        for (let i = 0; i < zombies.length; i++) {
            let z = zombies[i];
            let angle = Math.atan2(player.y - z.y, player.x - z.x);
            z.x += Math.cos(angle) * z.speed;
            z.y += Math.sin(angle) * z.speed;

            if (Math.hypot(player.x - z.x, player.y - z.y) < player.radius + z.radius - 4) {
                triggerGameOver("Zombie đã cắn bạn!"); return;
            }
        }
    }

    function drawBullets() {
        bullets.forEach(b => {
            ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff'; ctx.fill();
        });
    }

    function updateBullets() {
        for (let i = 0; i < bullets.length; i++) {
            let b = bullets[i];
            b.x += b.vx; b.y += b.vy;

            if (b.x < 0 || b.x > GAME_WIDTH || b.y < 0 || b.y > GAME_HEIGHT) {
                bullets.splice(i, 1); i--; continue;
            }

            for (let j = 0; j < zombies.length; j++) {
                let z = zombies[j];
                if (Math.hypot(b.x - z.x, b.y - z.y) < b.radius + z.radius) {
                    bullets.splice(i, 1); i--;
                    z.hp--; z.hitTimer = 4;
                    createParticles(b.x, b.y, '#0be881', 6, 3);
                    if (z.hp <= 0) { currentTargetZombie = z; triggerQuiz(); }
                    break;
                }
            }
        }
    }

    function createParticles(x, y, color, count, speedMult) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * speedMult * 4, vy: (Math.random() - 0.5) * speedMult * 4,
                life: 1, color: color, size: Math.random() * 3 + 1
            });
        }
    }
    
    function updateParticles() {
        for(let i=0; i<particles.length; i++) {
            let p = particles[i];
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1; p.x += p.vx; p.y += p.vy; p.life -= 0.04;
            if(p.life <= 0) { particles.splice(i, 1); i--; }
        }
    }

    function triggerQuiz() {
        state = 'QUIZ';
        resetInputs();
        uiQuiz.classList.remove('hidden');
        setTimeout(() => quizModal.classList.add('active'), 10);

        let qData = QUIZ_DATA[Math.floor(Math.random() * QUIZ_DATA.length)];
        questionText.innerText = qData.question;
        answersContainer.innerHTML = '';

        qData.answers.forEach((ans, index) => {
            let btn = document.createElement('button');
            btn.className = 'ans-btn'; btn.innerText = ans;
            btn.onclick = () => handleAnswer(btn, index === qData.correctIndex);
            answersContainer.appendChild(btn);
        });
    }

    function handleAnswer(btn, isCorrect) {
        document.querySelectorAll('.ans-btn').forEach(b => b.style.pointerEvents = 'none');
        
        if (isCorrect) {
            btn.classList.add('correct');
            if(currentTargetZombie) {
                createParticles(currentTargetZombie.x, currentTargetZombie.y, '#32ff7e', 30, 4);
                zombies = zombies.filter(z => z !== currentTargetZombie);
            }
            currentTargetZombie = null;
            setTimeout(() => {
                score++; scoreVal.innerText = score;
                quizModal.classList.remove('active');
                setTimeout(() => { uiQuiz.classList.add('hidden'); state = 'PLAY'; }, 300);
            }, 500);
        } else {
            btn.classList.add('wrong');
            setTimeout(() => {
                quizModal.classList.remove('active');
                setTimeout(() => {
                    uiQuiz.classList.add('hidden');
                    if(currentTargetZombie) {
                        currentTargetZombie.hp = currentTargetZombie.maxHp;
                        let angle = Math.atan2(currentTargetZombie.y - player.y, currentTargetZombie.x - player.x);
                        currentTargetZombie.x += Math.cos(angle) * 120; currentTargetZombie.y += Math.sin(angle) * 120;
                        currentTargetZombie = null;
                    }
                    state = 'PLAY';
                }, 300);
            }, 600);
        }
    }

    function triggerGameOver(reason) {
        if(state === 'OVER') return;
        state = 'OVER';
        resetInputs();
        createParticles(player.x, player.y, '#ff3838', 50, 5); 
        
        reloadingMsg.classList.add('hidden');
        finalScoreEl.innerText = score; failReasonEl.innerText = reason;
        
        setTimeout(() => {
            uiGameOver.classList.remove('hidden');
            setTimeout(() => uiGameOver.querySelector('.modal').classList.add('active'), 10);
        }, 600);
    }

    function startGame() {
        uiStart.querySelector('.modal').classList.remove('active');
        setTimeout(() => { uiStart.classList.add('hidden'); state = 'PLAY'; }, 200);
    }

    function resetGame() {
        zombies = []; bullets = []; particles = [];
        score = 0; frames = 0;
        player.x = GAME_WIDTH / 2; player.y = GAME_HEIGHT / 2;
        player.ammo = player.maxAmmo; player.isReloading = false;
        resetInputs();
        
        scoreVal.innerText = score; updateAmmoDisplay();
        uiGameOver.querySelector('.modal').classList.remove('active');
        setTimeout(() => { uiGameOver.classList.add('hidden'); startGame(); }, 300);
    }

    function resetInputs() {
        keys.w = keys.a = keys.s = keys.d = false;
        leftTouchId = null; rightTouchId = null;
        joystick.active = false; joystick.deltaX = 0; joystick.deltaY = 0;
        joyBase.style.left = '120px'; joyBase.style.top = (GAME_HEIGHT - 120) + 'px';
        joyBase.style.opacity = '0.5'; joyStick.style.transform = `translate(0px, 0px)`;
    }

    // --- Touch Events (Màn hình chính) ---
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        if (state !== 'PLAY') return;
        
        for (let touch of e.changedTouches) {
            if (touch.clientX < GAME_WIDTH / 2) {
                if (leftTouchId === null) {
                    leftTouchId = touch.identifier;
                    joystick.active = true;
                    joystick.originX = touch.clientX; joystick.originY = touch.clientY;
                    joystick.deltaX = 0; joystick.deltaY = 0;
                    
                    joyBase.style.left = joystick.originX + 'px';
                    joyBase.style.top = joystick.originY + 'px';
                    joyBase.style.opacity = '1';
                }
            } else {
                if (rightTouchId === null) {
                    rightTouchId = touch.identifier;
                    aimX = touch.clientX; aimY = touch.clientY;
                }
            }
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (state !== 'PLAY') return;
        for (let touch of e.changedTouches) {
            if (touch.identifier === leftTouchId) {
                let dx = touch.clientX - joystick.originX;
                let dy = touch.clientY - joystick.originY;
                let dist = Math.hypot(dx, dy);
                if (dist > joystick.maxRadius) {
                    let angle = Math.atan2(dy, dx);
                    joystick.deltaX = Math.cos(angle) * joystick.maxRadius;
                    joystick.deltaY = Math.sin(angle) * joystick.maxRadius;
                } else {
                    joystick.deltaX = dx; joystick.deltaY = dy;
                }
                joyStick.style.transform = `translate(${joystick.deltaX}px, ${joystick.deltaY}px)`;
            } else if (touch.identifier === rightTouchId) {
                aimX = touch.clientX; aimY = touch.clientY;
            }
        }
    }, {passive: false});

    function handleTouchEnd(e) {
        e.preventDefault();
        for (let touch of e.changedTouches) {
            if (touch.identifier === leftTouchId) {
                leftTouchId = null; joystick.active = false;
                joystick.deltaX = 0; joystick.deltaY = 0;
                joyBase.style.left = '120px'; joyBase.style.top = (GAME_HEIGHT - 120) + 'px';
                joyBase.style.opacity = '0.5'; joyStick.style.transform = `translate(0px, 0px)`;
            } else if (touch.identifier === rightTouchId) {
                rightTouchId = null;
            }
        }
    }
    canvas.addEventListener('touchend', handleTouchEnd);
    canvas.addEventListener('touchcancel', handleTouchEnd);

    // --- Desktop / Fallback Events ---
    window.addEventListener('keydown', e => {
        let key = e.key.toLowerCase();
        if(key === 'w' || e.key === 'ArrowUp') keys.w = true;
        if(key === 's' || e.key === 'ArrowDown') keys.s = true;
        if(key === 'a' || e.key === 'ArrowLeft') keys.a = true;
        if(key === 'd' || e.key === 'ArrowRight') keys.d = true;
        if(key === 'r') player.reload();
    });
    window.addEventListener('keyup', e => {
        let key = e.key.toLowerCase();
        if(key === 'w' || e.key === 'ArrowUp') keys.w = false;
        if(key === 's' || e.key === 'ArrowDown') keys.s = false;
        if(key === 'a' || e.key === 'ArrowLeft') keys.a = false;
        if(key === 'd' || e.key === 'ArrowRight') keys.d = false;
    });
    canvas.addEventListener('mousemove', e => { if (!rightTouchId) { aimX = e.clientX; aimY = e.clientY; } });
    canvas.addEventListener('mousedown', e => { if (state === 'PLAY' && e.clientX > GAME_WIDTH/2) player.shoot(); });

    // --- UI Buttons Events ---
    btnShoot.addEventListener('touchstart', e => { e.preventDefault(); player.shoot(); });
    btnShoot.addEventListener('mousedown', e => { e.preventDefault(); player.shoot(); });
    btnReload.addEventListener('touchstart', e => { e.preventDefault(); player.reload(); });
    btnReload.addEventListener('mousedown', e => { e.preventDefault(); player.reload(); });
    document.getElementById('ammo-hud').addEventListener('touchstart', e => { e.preventDefault(); player.reload(); });
    
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', resetGame);

    window.addEventListener('resize', () => {
        GAME_WIDTH = window.innerWidth; GAME_HEIGHT = window.innerHeight;
        canvas.width = GAME_WIDTH; canvas.height = GAME_HEIGHT;
        if (!joystick.active) { joyBase.style.left = '120px'; joyBase.style.top = (GAME_HEIGHT - 120) + 'px'; }
    });

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        updateParticles();
        
        if (state === 'PLAY' || state === 'OVER') {
            if (state === 'PLAY') { player.update(); updateBullets(); updateZombies(); frames++; }
            drawBullets(); drawZombies();
            if (state !== 'OVER' || particles.length > 0) player.draw();
        } else if (state === 'START' || state === 'QUIZ') {
            drawBullets(); drawZombies(); player.draw();
        }
        requestAnimationFrame(loop);
    }
    
    document.fonts.ready.then(() => loop());
</script>
</body>
</html>
