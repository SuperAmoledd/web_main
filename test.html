<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Custom Cursor</title>
    <style>
        body {
            height: 100vh;
            background-color: #1a1a1a; /* Nền tối để thấy rõ hiệu ứng */
            cursor: none; /* Ẩn chuột mặc định */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Lớp bao bọc --- */
        .cursor-dot,
        .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            pointer-events: none; /* Click xuyên qua */
            z-index: 9999;
        }

        /* --- 1. Chấm nhỏ (Con trỏ chính) --- */
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: white;
        }

        /* --- 2. Vòng tròn lớn (Hiệu ứng đi theo) --- */
        .cursor-outline {
            width: 40px;
            height: 40px;
            /* Gradient cũ của bạn */
            border: 2px solid transparent; /* Để dùng border gradient cần trick hoặc để background */
            background-image: linear-gradient(#1a1a1a, #1a1a1a), /* Giả lập rỗng ruột */
                              linear-gradient(245deg, #fcb564, #ff65f2, #d66efd);
            background-origin: border-box;
            background-clip: content-box, border-box;
            
            /* Hiệu ứng chuyển động mượt khi hover */
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }

        /* --- 3. Trạng thái khi Hover vào nút/link --- */
        body.hovering .cursor-outline {
            width: 70px; /* Phóng to */
            height: 70px;
            background: rgba(255, 255, 255, 0.1); /* Mờ đi */
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* Nút demo */
        button {
            padding: 15px 30px;
            font-size: 20px;
            background: transparent;
            color: white;
            border: 1px solid #ff65f2;
            cursor: none; /* Quan trọng: ẩn chuột hệ thống khi hover vào nút */
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>

    <button>Hover Me!</button>

    <script>
        const dot = document.getElementById("cursor-dot");
        const outline = document.getElementById("cursor-outline");
        
        let mouseX = 0, mouseY = 0; // Vị trí chuột thật
        let outlineX = 0, outlineY = 0; // Vị trí vòng tròn (để tạo độ trễ)

        // 1. Lấy tọa độ chuột
        document.addEventListener("mousemove", (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Dot đi theo ngay lập tức (không trễ)
            dot.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%, -50%)`;
        });

        // 2. Tạo hiệu ứng quán tính (Lag effect) cho vòng tròn
        function animate() {
            // Công thức nội suy tuyến tính (Lerp): Vị trí hiện tại + (Đích - Hiện tại) * tốc độ
            outlineX += (mouseX - outlineX) * 0.15; // 0.15 là độ mượt (càng nhỏ càng chậm)
            outlineY += (mouseY - outlineY) * 0.15;

            outline.style.transform = `translate(${outlineX}px, ${outlineY}px) translate(-50%, -50%)`;

            requestAnimationFrame(animate); // Chạy liên tục theo FPS màn hình
        }
        animate();

        // 3. Xử lý Hover (Phóng to khi vào link/button)
        const interactiveElements = document.querySelectorAll('a, button, input');

        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => {
                document.body.classList.add('hovering');
            });
            el.addEventListener('mouseleave', () => {
                document.body.classList.remove('hovering');
            });
        });
    </script>
</body>
</html>
